<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Saved Jobs | Look Nepal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous" />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/faed8028ee.js" crossorigin="anonymous"></script>
</head>

<body class="bg-light">
    <div class="nav-div bg-white shadow-sm border-bottom">
        <nav class="navbar navbar-expand-lg bg-white">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="index.html">Look Nepal</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="companies.html">Company Reviews</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="salary.html">Search Salary</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-3">
                        <a href="post-job.html" class="btn btn-outline-primary rounded-pill px-4" role="button">Post a
                            Job</a>
                        <a href="signIn.html" class="btn btn-primary rounded-pill px-4 text-white" role="button">Sign
                            In</a>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <div class="container my-5" style="min-height: 60vh;">
        <div class="row mb-4 align-items-center">
            <div class="col">
                <h2 class="fw-bold mb-0">Saved Jobs</h2>
                <p class="text-muted mt-1">Jobs you've bookmarked to review or apply to later.</p>
            </div>
        </div>

        <div class="row">
            <div class="col-12" id="applicationsList">
                <!-- Loading State -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 text-muted">Retrieving your saved jobs...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer bg-white mt-auto border-top">
        <footer class="global-footer">
            <ul class="footer-down text-center p-4 m-0 list-unstyled d-flex justify-content-center gap-4 text-muted">
                <li>2024 Look Nepal</li>
                <li>Accessibility</li>
                <li>Privacy Centre</li>
                <li>Terms</li>
            </ul>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            setTimeout(async () => {
                const user = window.LookNepal.currentUser();
                if (!user || user.userType !== 'job_seeker') {
                    window.location.href = 'signIn.html?returnUrl=saved-jobs.html';
                    return;
                }

                try {
                    const data = await window.LookNepal.apiCall('/users/saved-jobs');
                    const savedJobs = data.savedJobs;

                    const container = document.getElementById('applicationsList');

                    if (!savedJobs || savedJobs.length === 0) {
                        container.innerHTML = `
              <div class="text-center py-5 bg-white rounded-4 shadow-sm border border-light">
                <i class="fa-regular fa-bookmark fs-1 text-muted opacity-50 mb-3"></i>
                <h4 class="fw-bold">No saved jobs yet</h4>
                <p class="text-muted">When you see a job you like, bookmark it so you can review it later.</p>
                <a href="index.html" class="btn btn-primary rounded-pill px-4 mt-2 fw-bold text-white">Find jobs</a>
              </div>
            `;
                        return;
                    }

                    container.innerHTML = savedJobs.map(job => {
                        const company = job.company || {};
                        const salary = job.salary ? `Rs.${job.salary.min.toLocaleString()} - Rs.${job.salary.max.toLocaleString()} a month` : 'Salary not specified';
                        const location = job.location ? `${job.location.city}, ${job.location.country}` : 'Location not specified';

                        return `
              <div class="card mb-3 shadow-sm border-0 job-card" style="transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.classList.add('shadow')" onmouseout="this.style.transform='none'; this.classList.remove('shadow')">
                <div class="card-body p-4 position-relative">
                  <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="card-title fw-bold mb-1">
                      <a href="job-details.html?id=${job._id}" class="text-dark text-decoration-none">${job.title}</a>
                    </h5>
                    <div>
                      <button class="btn btn-sm btn-outline-danger ms-2 rounded-pill" onclick="unsaveJob('${job._id}', this)">
                        <i class="fa-solid fa-trash me-1"></i> Remove
                      </button>
                    </div>
                  </div>
                  
                  <div class="d-flex align-items-center mb-3">
                    <i class="fa-regular fa-building text-muted me-2"></i>
                    <span class="text-muted fw-semibold">${company.name || 'Company Name'}</span>
                    <span class="mx-2 text-muted">•</span>
                    <i class="fa-solid fa-location-dot text-muted me-1"></i>
                    <span class="text-muted">${location}</span>
                  </div>
                  
                  <div class="d-flex gap-2 flex-wrap mb-3">
                    <span class="badge bg-light text-dark fw-normal border px-2 py-1"><i class="fa-solid fa-money-bill-1-wave me-1 text-secondary"></i>${salary}</span>
                    <span class="badge bg-light text-dark fw-normal border px-2 py-1"><i class="fa-solid fa-briefcase me-1 text-secondary"></i>${job.jobType || 'Full-time'}</span>
                  </div>
                  
                  <div class="mt-3 text-end">
                     <a href="job-details.html?id=${job._id}&apply=true" class="btn btn-primary btn-sm rounded-pill px-4 fw-bold shadow-sm text-white">Apply Now</a>
                  </div>
                </div>
              </div>
            `;
                    }).join('');

                } catch (e) {
                    <i class="fa-solid fa-circle-exclamation me-2"></i> Failed to load your applications.Please try again later.
              </div >
            `;
        }
      }, 100);
    });
    </script>
</body>

</html>
