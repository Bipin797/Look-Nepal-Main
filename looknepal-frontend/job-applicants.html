<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Applicants | Look Nepal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous" />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/faed8028ee.js" crossorigin="anonymous"></script>
</head>

<body class="bg-light d-flex flex-column min-vh-100">
    <!-- Simple Navbar -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="employer-dashboard.html">
                <i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard
            </a>
            <div class="ms-auto text-muted fw-semibold">Employer Application Review</div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5 flex-grow-1">
        <div class="row mb-5">
            <div class="col-12">
                <h2 class="fw-bold mb-1 text-dark" id="jobTitleHeader">Loading Job...</h2>
                <p class="text-muted mb-0 fs-5" id="jobInfoSubheader">Reviewing candidate applications</p>
            </div>
        </div>

        <div id="applicantsList">
            <!-- Loading State -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted fw-semibold">Retrieving applicants...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer bg-white mt-auto border-top">
        <footer class="global-footer">
            <ul class="footer-down text-center p-4 m-0 list-unstyled d-flex justify-content-center gap-4 text-muted">
                <li>2024 Look Nepal</li>
                <li>Accessibility</li>
                <li>Privacy Centre</li>
                <li>Terms</li>
            </ul>
        </footer>
    </div>

    <!-- Javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(async () => {
                const user = window.LookNepal.currentUser();
                if (!user || user.userType !== 'employer') {
                    window.location.href = 'signIn.html';
                    return;
                }

                const urlParams = new URLSearchParams(window.location.search);
                const jobId = urlParams.get('jobId');

                if (!jobId) {
                    document.getElementById('applicantsList').innerHTML = `
                        <div class="alert alert-danger shadow-sm rounded-4 p-4 text-center">
                            <h5 class="fw-bold"><i class="fa-solid fa-triangle-exclamation me-2"></i> No Job Selected</h5>
                            <p class="mb-0">Please return to your dashboard and select a job to view its applicants.</p>
                            <a href="employer-dashboard.html" class="btn btn-outline-danger rounded-pill mt-3 px-4">Go to Dashboard</a>
                        </div>
                    `;
                    return;
                }

                try {
                    // Fetch job title
                    const jobData = await window.LookNepal.apiCall('/jobs/' + jobId);
                    document.getElementById('jobTitleHeader').textContent = 'Applicants for "' + jobData.job.title + '"';

                    // Fetch applicant tracking list
                    const data = await window.LookNepal.apiCall('/applications/job/' + jobId);
                    const apps = data.applications;

                    if (!apps || apps.length === 0) {
                        document.getElementById('applicantsList').innerHTML = `
                           <div class="text-center py-5 bg-white border rounded-4 shadow-sm p-5">
                              <img src="https://cdni.iconscout.com/illustration/premium/thumb/empty-state-2130362-1800926.png" style="max-height: 200px; opacity: 0.8; margin-bottom: 1.5rem;">
                              <h4 class="fw-bold text-dark">No applicants yet</h4>
                              <p class="text-muted">Once candidates apply, they will appear here for you to review.</p>
                           </div>
                       `;
                        return;
                    }

                    let html = '<div class="row g-4">';
                    apps.forEach(app => {
                        const seeker = app.applicant || {};
                        const date = new Date(app.appliedAt).toLocaleDateString();

                        // Default badge styling
                        let badgeClass = 'bg-secondary bg-opacity-10 text-secondary border-secondary';
                        if (app.status === 'shortlisted' || app.status === 'accepted') badgeClass = 'bg-success bg-opacity-10 text-success border-success';
                        if (app.status === 'rejected') badgeClass = 'bg-danger bg-opacity-10 text-danger border-danger';

                        html += `
                         <div class="col-12" id="appCard_${app._id}">
                            <div class="card p-4 mx-auto border bg-white shadow-sm rounded-4" style="transition: transform 0.2s ease;">
                               <div class="row align-items-center">
                                  <!-- Candidate Info -->
                                  <div class="col-md-3 border-end pe-4">
                                     <h5 class="fw-bold mb-1 text-dark">${seeker.firstName} ${seeker.lastName}</h5>
                                     <p class="text-muted small mb-1"><i class="fa-solid fa-envelope me-2"></i>${seeker.email}</p>
                                     <p class="text-muted small mb-3"><i class="fa-solid fa-phone me-2"></i>${seeker.phone || 'No phone provided'}</p>
                                     <p class="small text-muted fw-semibold"><i class="fa-regular fa-calendar-check me-2"></i>Applied ${date}</p>
                                  </div>
                                  
                                  <!-- Cover Letter -->
                                  <div class="col-md-5 px-4">
                                     <h6 class="fw-bold fs-6 mb-2 text-primary">Cover Letter</h6>
                                     <div class="bg-light p-3 rounded-3 small text-muted text-break" style="max-height: 120px; overflow-y: auto; border: 1px dashed #ccc;">
                                        ${app.coverLetter || '<i>Candidate did not provide a cover letter.</i>'}
                                     </div>
                                  </div>
                                  
                                  <!-- Actions -->
                                  <div class="col-md-4 text-md-end ps-4 mt-4 mt-md-0">
                                     <div class="mb-3">
                                         <span class="badge ${badgeClass} border px-3 py-2 rounded-pill shadow-sm text-capitalize" id="badge_${app._id}">Status: ${app.status}</span>
                                     </div>
                                     <div class="btn-group shadow-sm rounded-pill w-100 mb-2">
                                         <button class="btn btn-outline-success fw-bold py-2 w-50" onclick="window.updateStatus('${app._id}', 'shortlisted')"><i class="fa-solid fa-check me-1"></i> Shortlist</button>
                                         <button class="btn btn-outline-danger fw-bold py-2 w-50" onclick="window.updateStatus('${app._id}', 'rejected')"><i class="fa-solid fa-xmark me-1"></i> Reject</button>
                                     </div>
                                     <button class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm" onclick="openMessageModal('${seeker._id}', '${app.job}')"><i class="fa-regular fa-paper-plane me-2"></i> Message Applicant</button>
                                  </div>
                               </div>
                            </div>
                         </div>
                       `;
                    });
                    html += '</div>';
                    document.getElementById('applicantsList').innerHTML = html;

                } catch (e) {
                    console.error(e);
                    document.getElementById('applicantsList').innerHTML = `
                        <div class="alert alert-danger shadow-sm rounded-4 p-4 text-center">
                            <h5 class="fw-bold"><i class="fa-solid fa-circle-xmark me-2"></i> Failed to Load</h5>
                            <p class="mb-0">There was a problem retrieving data from the server. Please try again later.</p>
                        </div>
                    `;
                }
            }, 100);
        });

        // Global status update function
        window.updateStatus = async function (appId, status) {
            try {
                // Disable buttons temporarily to prevent double click
                const card = document.getElementById('appCard_' + appId);
                if (card) {
                    const btns = card.querySelectorAll('button');
                    btns.forEach(btn => btn.disabled = true);
                }

                await window.LookNepal.apiCall('/applications/' + appId + '/status', {
                    method: 'PUT',
                    body: JSON.stringify({ status })
                });

                // Update UI badge
                const badge = document.getElementById('badge_' + appId);
                if (badge) {
                    badge.textContent = 'Status: ' + status;
                    if (status === 'shortlisted') {
                        badge.className = 'badge bg-success bg-opacity-10 text-success border border-success px-3 py-2 rounded-pill shadow-sm text-capitalize';
                    } else if (status === 'rejected') {
                        badge.className = 'badge bg-danger bg-opacity-10 text-danger border border-danger px-3 py-2 rounded-pill shadow-sm text-capitalize';
                    }
                }

                // Re-enable
                if (card) {
                    const btns = card.querySelectorAll('button');
                    btns.forEach(btn => btn.disabled = false);
                }

            } catch (e) {
                alert("Failed to update status: " + e.message);
                const card = document.getElementById('appCard_' + appId);
                if (card) {
                    const btns = card.querySelectorAll('button');
                    btns.forEach(btn => btn.disabled = false);
                }
            }
        };

        let currentMessageReceiver = null;
        let currentMessageJobContext = null;

        function openMessageModal(seekerId, jobId) {
            currentMessageReceiver = seekerId;
            currentMessageJobContext = jobId;
            document.getElementById('directMessageContent').value = '';
            const modal = new bootstrap.Modal(document.getElementById('messageModal'));
            modal.show();
        }

        async function sendDirectMessage() {
            const content = document.getElementById('directMessageContent').value.trim();
            if (!content || !currentMessageReceiver) {
                alert('Please enter a message to send.');
                return;
            }

            try {
                await LookNepal.apiCall('/messages', {
                    method: 'POST',
                    body: JSON.stringify({
                        receiverId: currentMessageReceiver,
                        content,
                        jobContext: currentMessageJobContext
                    })
                });

                bootstrap.Modal.getInstance(document.getElementById('messageModal')).hide();
                alert('Message sent successfully! You will now be redirected to your messages.');
                window.location.href = 'messages.html';

            } catch (error) {
                alert(error.message || 'Failed to send message.');
            }
        }
    </script>
</body>

</html>
