<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Search Salaries | Look Nepal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous" />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/faed8028ee.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="nav-div">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="/index.html">Look Nepal</a>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="/index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="companies.html">Company Reviews</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="salary.html">Search Salary</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <hr />

    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold">Find a career you'll love</h1>
            <p class="lead">Search for salaries and compensation trends.</p>
        </div>

        <div class="search-box mx-auto mb-5" style="max-width: 800px;">
            <div class="text-search w-100">
                <input type="text" id="salarySearch" placeholder="Job title (e.g. Software Engineer)"
                    class="border-0 shadow-none w-100 p-2">
            </div>
            <div class="search-button-div">
                <button type="button" class="search-button" onclick="searchSalaries()">Search</button>
            </div>
        </div>

        <div id="salaryResults" class="row justify-content-center">
            <!-- Results will appear here -->
            <div class="col-md-8 text-center text-muted">
                <i class="fa-solid fa-chart-line fa-3x mb-3"></i>
                <p>Enter a job title to see salary ranges based on active job postings.</p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        async function searchSalaries() {
            const query = document.getElementById('salarySearch').value;
            if (!query) return;

            const container = document.getElementById('salaryResults');
            container.innerHTML = `
                <div class="text-center py-5 w-100">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p>Analyzing salary data...</p>
                </div>
            `;

            try {
                // We'll use the jobs API to get data and aggregate it client-side for now
                const params = new URLSearchParams();
                params.append('keyword', query);
                params.append('limit', 50); // Get a good sample size

                const data = await LookNepal.apiCall(`/jobs?${params.toString()}`);
                const jobs = data.jobs.filter(j => j.salary && j.salary.min && j.salary.max);

                if (jobs.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center">No salary data found for this job title.</div>';
                    return;
                }

                // Calculate averages
                const avgMin = Math.round(jobs.reduce((acc, j) => acc + j.salary.min, 0) / jobs.length);
                const avgMax = Math.round(jobs.reduce((acc, j) => acc + j.salary.max, 0) / jobs.length);
                const overallAvg = Math.round((avgMin + avgMax) / 2);

                container.innerHTML = `
                    <div class="col-md-8">
                        <div class="card shadow-sm">
                            <div class="card-body p-5 text-center">
                                <h2 class="mb-4">Average Salary for "${query}"</h2>
                                <h1 class="display-3 fw-bold text-success mb-4">Rs. ${overallAvg.toLocaleString()}</h1>
                                <p class="text-muted">per month</p>
                                
                                <div class="progress mt-4 mb-2" style="height: 20px;">
                                    <div class="progress-bar bg-info" role="progressbar" style="width: 50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <div class="d-flex justify-content-between text-muted small">
                                    <span>Min: Rs. ${avgMin.toLocaleString()}</span>
                                    <span>Max: Rs. ${avgMax.toLocaleString()}</span>
                                </div>

                                <div class="mt-5 text-start">
                                    <h5>Based on ${jobs.length} job postings</h5>
                                    <p>The average salary for a ${query} is Rs. ${overallAvg.toLocaleString()} per month in Nepal.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                container.innerHTML = `<div class="col-12 alert alert-danger">Error loading salary data: ${error.message}</div>`;
            }
        }
    </script>
</body>

</html>
