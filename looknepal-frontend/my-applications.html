<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>My Applications | Look Nepal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous" />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/faed8028ee.js" crossorigin="anonymous"></script>
</head>

<body class="bg-light">
    <div class="nav-div bg-white shadow-sm border-bottom">
        <nav class="navbar navbar-expand-lg bg-white">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="index.html">Look Nepal</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="companies.html">Company Reviews</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="salary.html">Search Salary</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-3">
                        <a href="post-job.html" class="btn btn-outline-primary rounded-pill px-4" role="button">Post a
                            Job</a>
                        <a href="signIn.html" class="btn btn-primary rounded-pill px-4 text-white" role="button">Sign
                            In</a>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <div class="container my-5" style="min-height: 60vh;">
        <div class="row mb-4 align-items-center">
            <div class="col">
                <h2 class="fw-bold mb-0">My Applications</h2>
                <p class="text-muted mt-1">Track the status of jobs you've applied for.</p>
            </div>
        </div>

        <div class="row">
            <div class="col-12" id="applicationsList">
                <!-- Loading State -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 text-muted">Retrieving your applications...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer bg-white mt-auto border-top">
        <footer class="global-footer">
            <ul class="footer-down text-center p-4 m-0 list-unstyled d-flex justify-content-center gap-4 text-muted">
                <li>2024 Look Nepal</li>
                <li>Accessibility</li>
                <li>Privacy Centre</li>
                <li>Terms</li>
            </ul>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
      setTimeout(async () => {
        const user = window.LookNepal.currentUser();
        if(!user || user.userType !== 'job_seeker') {
           window.location.href = 'index.html';
           return;
        }
        
        try {
          const data = await window.LookNepal.apiCall('/applications/my-applications');
          const apps = data.applications;
          
          if(!apps || apps.length === 0) {
             document.getElementById('applicationsList').innerHTML = `
               <div class="text-center py-5 bg-white rounded-4 border shadow-sm empty-state p-5">
                  <img src="https://cdni.iconscout.com/illustration/premium/thumb/empty-state-2130362-1800926.png" alt="No Applications" style="max-height: 200px; opacity: 0.8; margin-bottom: 1.5rem;">
                  <h4 class="fw-bold text-dark">No applications yet</h4>
                  <p class="text-muted">You haven't applied to any jobs yet. Start exploring and find your dream role!</p>
                  <a href="index.html" class="btn btn-primary mt-3 px-4 py-2 rounded-pill fw-bold">Find Jobs</a>
               </div>
             `;
             return;
          }
          
          let html = '<div class="row g-3">';
          apps.forEach(app => {
             const job = app.job || {};
             const company = job.company || {};
             const appliedDate = new Date(app.appliedAt).toLocaleDateString();
             
             let badgeClass = 'bg-secondary';
             if(app.status === 'shortlisted' || app.status === 'accepted') badgeClass = 'bg-success';
             if(app.status === 'rejected') badgeClass = 'bg-danger';
             if(app.status === 'under review') badgeClass = 'bg-warning text-dark';
             
             html += `
               <div class="col-12">
                 <div class="card p-4 border application-card bg-white shadow-sm" style="transition: all 0.2s ease; cursor: pointer; border-radius: 12px;" onclick="window.location.href='job-details.html?id=${job._id}'">
                    <div class="d-flex w-100 justify-content-between align-items-center flex-wrap gap-3">
                      <div>
                        <h5 class="mb-1 fw-bold text-dark">${job.title || 'Position Currently Unavailable'}</h5>
                        <p class="mb-2 text-muted"><i class="fa-solid fa-building me-1"></i> ${company.name || 'Company Hidden'}</p>
                        <small class="text-muted"><i class="fa-regular fa-calendar me-1"></i> Applied on ${appliedDate}</small>
                      </div>
                      <div class="text-end">
                        <span class="badge ${badgeClass} fs-6 px-3 py-2 rounded-pill text-capitalize shadow-sm">${app.status || 'Unknown'}</span>
                      </div>
                    </div>
                 </div>
               </div>
             `;
          });
          html += '</div>';
          
          document.getElementById('applicationsList').innerHTML = html;
        } catch(e) {
            console.error(e);
            document.getElementById('applicationsList').innerHTML = `
              <div class="alert alert-danger shadow-sm rounded-3">
                <i class="fa-solid fa-circle-exclamation me-2"></i> Failed to load your applications. Please try again later.
              </div>
            `;
        }
      }, 100);
    });
    </script>
</body>

</html>
