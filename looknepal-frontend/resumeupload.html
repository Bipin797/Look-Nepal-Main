<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume | Look Nepal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/faed8028ee.js" crossorigin="anonymous"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
    <style>
        .upload-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: #f8f9fa;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: #0e46a3;
            background-color: #eef2ff;
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div class="nav-div bg-white">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="index.html">Look Nepal</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <hr class="m-0">

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="row justify-content-center w-100">
            <div class="col-md-8 col-lg-6">
                <!-- Upload Card -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="mb-4">
                            <a href="profile.html" class="text-decoration-none text-muted small"><i
                                    class="fa-solid fa-arrow-left me-1"></i> Back to Profile</a>
                        </div>

                        <h2 class="card-title fw-bold mb-3 text-center">Add a Resume</h2>
                        <p class="text-muted text-center mb-4">Upload your resume to apply for jobs faster.</p>

                        <div id="uploadZone" class="upload-zone mb-4">
                            <i class="fa-solid fa-cloud-arrow-up fa-3x text-primary mb-3"></i>
                            <h5 class="fw-bold">Upload resume</h5>
                            <p class="text-muted small mb-0">Drag and drop or click to browse</p>
                            <p class="text-muted small mt-2">PDF, DOCX up to 5MB</p>
                            <input type="file" id="fileInput" accept=".pdf,.doc,.docx" hidden>
                        </div>

                        <div id="previewSection" class="d-none mb-4">
                            <div class="d-flex align-items-center p-3 border rounded bg-white">
                                <i class="fa-solid fa-file-lines fa-2x text-primary me-3"></i>
                                <div class="flex-grow-1 overflow-hidden">
                                    <div id="fileName" class="fw-bold text-truncate">resume.pdf</div>
                                    <div id="fileSize" class="small text-muted">1.2 MB</div>
                                </div>
                                <button class="btn btn-link text-danger" onclick="clearFile()"><i
                                        class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>

                        <!-- Progress Bar (Hidden by default) -->
                        <div id="uploadProgress" class="progress mb-4 d-none" style="height: 5px;">
                            <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                        </div>

                        <div class="d-grid">
                            <button id="uploadBtn" class="btn btn-primary btn-lg rounded-pill" disabled
                                onclick="uploadResume()">
                                Upload Resume
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main JS -->
    <script src="js/main.js"></script>
    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        let selectedFile = null;

        // Drag and Drop Events
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Click to upload
        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            // Validation
            const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
            const maxSize = 5 * 1024 * 1024; // 5MB

            if (!validTypes.includes(file.type)) {
                alert('Invalid file format. Please upload PDF or DOCX.');
                return;
            }
            if (file.size > maxSize) {
                alert('File size too large. Max 5MB.');
                return;
            }

            selectedFile = file;

            // Show preview
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('uploadZone').classList.add('d-none');
            document.getElementById('previewSection').classList.remove('d-none');
            uploadBtn.disabled = false;
        }

        function clearFile() {
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('uploadZone').classList.remove('d-none');
            document.getElementById('previewSection').classList.add('d-none');
            uploadBtn.disabled = true;
        }

        async function uploadResume() {
            if (!selectedFile) return;

            const progressBar = document.querySelector('.progress-bar');
            const progressContainer = document.getElementById('uploadProgress');

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Uploading...';
            progressContainer.classList.remove('d-none');
            progressBar.style.width = '50%'; // Simulate progress

            const formData = new FormData();
            formData.append('resume', selectedFile);

            try {
                // We use standard fetch here because apiCall defaults to JSON and Headers handling might be tricky with FormData on wrappers
                // But let's see if we can use simple fetch with token
                const token = LookNepal.authToken();
                const response = await fetch('http://localhost:3000/api/auth/upload-resume', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                        // Do NOT set Content-Type header for FormData, browser does it with boundary
                    },
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Upload failed');
                }

                progressBar.style.width = '100%';

                // Success - Notify AI Data
                let successMessage = 'Resume uploaded successfully!';

                if (data.parsedData && (data.parsedData.skillsAdded.length > 0 || data.parsedData.educationAdded.length > 0)) {
                    let aiText = 'AI Extracted: ';
                    if (data.parsedData.skillsAdded.length > 0) aiText += `${data.parsedData.skillsAdded.length} Skills`;
                    if (data.parsedData.educationAdded.length > 0) aiText += `${data.parsedData.skillsAdded.length > 0 ? ', ' : ''}${data.parsedData.educationAdded.length} Education Credentials`;

                    window.LookNepal.showToast(`Resume mapped to profile! ${aiText}`, 'success');
                } else {
                    window.LookNepal.showToast(successMessage, 'success');
                }

                // Update local user data if needed
                if (data.user) {
                    LookNepal.setCurrentUser(data.user);
                }

                // Redirect to profile after short delay to let them read the AI magic
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 2000);

            } catch (error) {
                console.error(error);
                alert(error.message || 'Upload failed');
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload Resume';
                progressBar.style.width = '0%';
                progressContainer.classList.add('d-none');
            }
        }
    </script>
</body>

</html>
