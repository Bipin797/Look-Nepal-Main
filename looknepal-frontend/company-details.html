<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Company Details | Look Nepal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous" />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/faed8028ee.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="nav-div">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="/index.html">Look Nepal</a>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="/index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="companies.html">Company Reviews</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="salary.html">Search Salary</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <hr />

    <div class="container mt-5 mb-5" id="companyContent">
        <!-- Loading State -->
        <div class="text-center py-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p>Loading company details...</p>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Write a Review</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Overall Rating (1-5)</label>
                            <select id="reviewRating" class="form-select bg-light">
                                <option value="5" selected>5 - Excellent</option>
                                <option value="4">4 - Good</option>
                                <option value="3">3 - Okay</option>
                                <option value="2">2 - Poor</option>
                                <option value="1">1 - Terrible</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Employment Status</label>
                            <select id="reviewStatus" class="form-select bg-light">
                                <option value="current" selected>Current Employee</option>
                                <option value="former">Former Employee</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Review Title</label>
                            <input type="text" id="reviewTitle" class="form-control bg-light"
                                placeholder="e.g. Great place to work">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Your Job Title</label>
                            <input type="text" id="reviewJobTitle" class="form-control bg-light"
                                placeholder="e.g. Software Engineer">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold small text-muted text-success">Pros</label>
                            <textarea id="reviewPros" class="form-control bg-light" rows="3"
                                placeholder="What are the best parts of working here?"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold small text-muted text-danger">Cons</label>
                            <textarea id="reviewCons" class="form-control bg-light" rows="3"
                                placeholder="What are the downsides of working here?"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4"
                        data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" id="submitReviewBtn"
                        onclick="submitReview()">Submit Review</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                document.getElementById('companyContent').innerHTML = '<div class="alert alert-danger">No company specified.</div>';
                return;
            }

            try {
                // Fetch company details and jobs
                const [companyRes, jobsRes, reviewsRes] = await Promise.all([
                    LookNepal.apiCall(`/companies/${slug}`),
                    LookNepal.apiCall(`/companies/${slug}/jobs`),
                    LookNepal.apiCall(`/companies/${slug}/reviews`).catch(() => ({ reviews: [] }))
                ]);

                const company = companyRes.company;
                const jobs = jobsRes.jobs;
                const reviews = reviewsRes.reviews;

                document.getElementById('companyContent').innerHTML = `
                    <div class="row">
                        <div class="col-md-8">
                            <div class="d-flex align-items-center mb-4">
                                <div class="bg-light rounded p-3 me-4" style="width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;">
                                    <i class="fa-solid fa-building fa-3x text-secondary"></i>
                                </div>
                                <div>
                                    <h1 class="mb-1">${company.name}</h1>
                                    <p class="text-muted mb-2">${company.industry} • ${company.address.city}</p>
                                    <div class="text-warning">
                                        <i class="fa-solid fa-star"></i> ${company.rating ? company.rating.overall : 'N/A'} Rating
                                    </div>
                                </div>
                            </div>

                            <div class="mb-5">
                                <h3>About</h3>
                                <p>${company.description}</p>
                            </div>

                            <div class="mb-5">
                                <h3>Open Jobs (${jobs.length})</h3>
                                <div class="list-group">
                                    ${jobs.length > 0 ? jobs.map(job => `
                                        <a href="job-details.html?id=${job._id}" class="list-group-item list-group-item-action p-3">
                                            <div class="d-flex w-100 justify-content-between">
                                                <h5 class="mb-1">${job.title}</h5>
                                                <small>${new Date(job.createdAt).toLocaleDateString()}</small>
                                            </div>
                                            <p class="mb-1">${job.location.city}</p>
                                            <small class="text-muted">${job.jobType}</small>
                                        </a>
                                    `).join('') : '<p>No active job openings.</p>'}
                                </div>
                            </div>

                            <div class="mb-5">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h3>Reviews (${reviews.length})</h3>
                                    <button class="btn btn-outline-primary rounded-pill fw-bold px-4" onclick="openReviewModal()">Write a Review</button>
                                </div>
                                
                                <div id="reviewsContainer">
                                    ${reviews.length > 0 ? reviews.map(review => `
                                        <div class="card shadow-sm border-0 mb-3 rounded-4">
                                            <div class="card-body p-4">
                                                <div class="d-flex justify-content-between mb-2">
                                                    <h5 class="fw-bold">${review.title}</h5>
                                                    <span class="text-warning fw-bold"><i class="fa-solid fa-star"></i> ${review.rating.overall}.0</span>
                                                </div>
                                                <p class="text-muted small mb-3">
                                                    <strong>${review.employmentStatus === 'current' ? 'Current Employee' : 'Former Employee'}</strong> 
                                                    - ${review.jobTitle} • ${new Date(review.createdAt).toLocaleDateString()}
                                                </p>
                                                <div class="row">
                                                    <div class="col-md-6 mb-2">
                                                        <h6 class="text-success fw-bold"><i class="fa-solid fa-plus me-1"></i> Pros</h6>
                                                        <p class="small text-muted">${review.pros}</p>
                                                    </div>
                                                    <div class="col-md-6 mb-2">
                                                        <h6 class="text-danger fw-bold"><i class="fa-solid fa-minus me-1"></i> Cons</h6>
                                                        <p class="small text-muted">${review.cons}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('') : '<div class="text-center py-4 bg-light rounded-4 text-muted"><i class="fa-regular fa-star fa-2x mb-2"></i><p>No reviews yet. Be the first to review!</p></div>'}
                                </div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card shadow-sm mb-4">
                                <div class="card-body">
                                    <h5 class="card-title">Company Info</h5>
                                    <ul class="list-unstyled mt-3">
                                        <li class="mb-2"><strong>Size:</strong> ${company.companySize} employees</li>
                                        <li class="mb-2"><strong>Founded:</strong> ${company.foundedYear || 'N/A'}</li>
                                        <li class="mb-2"><strong>Website:</strong> <a href="${company.website}" target="_blank">${company.website || 'N/A'}</a></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                document.getElementById('companyContent').innerHTML = `<div class="alert alert-danger">Error loading company: ${error.message}</div>`;
            }
        });

        function openReviewModal() {
            const user = LookNepal.currentUser();
            if (!user) {
                sessionStorage.setItem('returnUrl', window.location.href);
                window.location.href = 'signIn.html';
                return;
            }
            const modal = new bootstrap.Modal(document.getElementById('reviewModal'));
            modal.show();
        }

        async function submitReview() {
            const slug = new URLSearchParams(window.location.search).get('slug');
            const submitBtn = document.getElementById('submitReviewBtn');

            const payload = {
                rating: {
                    overall: parseInt(document.getElementById('reviewRating').value)
                },
                title: document.getElementById('reviewTitle').value.trim(),
                jobTitle: document.getElementById('reviewJobTitle').value.trim(),
                employmentStatus: document.getElementById('reviewStatus').value,
                pros: document.getElementById('reviewPros').value.trim(),
                cons: document.getElementById('reviewCons').value.trim()
            };

            if (!payload.title || !payload.jobTitle || !payload.pros || !payload.cons) {
                alert('Please fill out all required fields.');
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';

                await LookNepal.apiCall(`/companies/${slug}/reviews`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
                alert('Review submitted successfully!');
                window.location.reload();

            } catch (error) {
                alert(error.message || 'Failed to submit review.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Review';
            }
        }
    </script>
</body>

</html>
