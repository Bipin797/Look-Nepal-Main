<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Create Account | Look Nepal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous" />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/faed8028ee.js" crossorigin="anonymous"></script>
</head>

<body style="background-color: #f6f5f2">
    <div>
        <div class="sign-in-main">
            <div>
                <h1>Look Nepal</h1>
            </div>
            <div class="sign-in-form" style="background-color: white">
                <h5>Create an Account</h5>
                <p style="color: grey">Join Look Nepal today.</p>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">I am a...</label>
                        <select class="form-select" id="userType" required>
                            <option value="job_seeker">Job Seeker</option>
                            <option value="employer">Employer</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">First Name*</label>
                            <input type="text" class="form-control" id="firstName" required />
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Last Name*</label>
                            <input type="text" class="form-control" id="lastName" required />
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address*</label>
                        <input type="email" class="form-control" id="email" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password* (min 6 chars)</label>
                        <input type="password" class="form-control" id="password" minlength="6" required />
                    </div>

                    <div class="sign-in-div">
                        <button type="submit" class="continue-btn">
                            Create Account <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </form>

                <div class="mt-3 text-center">
                    <p>Already have an account? <a href="signIn.html" style="color: #0e46a3; font-weight: 600">Sign
                            In</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main JavaScript -->
    <script src="js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                userType: document.getElementById('userType').value
            };

            try {
                const button = this.querySelector('button[type="submit"]');
                const originalText = button.innerHTML;
                button.disabled = true;
                button.innerHTML = 'Creating Account...';

                const response = await LookNepal.apiCall('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });

                LookNepal.setAuthToken(response.token);
                LookNepal.setCurrentUser(response.user);

                alert('Account created successfully!');
                window.location.href = 'index.html';

            } catch (error) {
                alert(error.message || 'Registration failed');
                const button = this.querySelector('button[type="submit"]');
                button.disabled = false;
                button.innerHTML = 'Create Account <i class="fa-solid fa-arrow-right"></i>';
            }
        });
    </script>
</body>

</html>
