<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password | Look Nepal</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 d-flex justify-content-center">

                <div class="auth-card">
                    <div class="text-center mb-4">
                        <a href="index.html" class="text-decoration-none">
                            <h1 class="text-primary fw-bold m-0" style="font-size: 2.5rem; letter-spacing: -1px;">
                                LookNepal</h1>
                        </a>
                    </div>

                    <h3 class="fw-bold mb-2">Create New Password</h3>
                    <p class="text-muted mb-4">Your new password must be at least 6 characters long.</p>

                    <form id="resetPasswordForm">
                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">New Password</label>
                            <input type="password" class="form-control" id="password" required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-medium">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" required minlength="6">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-medium mb-3"
                            id="submitBtn">
                            Update Password
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;

            if (password !== confirmPassword) {
                LookNepal.showToast('Validation Error', 'Passwords do not match.', 'danger');
                return;
            }

            // Extract the token parameter from the URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                LookNepal.showToast('Invalid Request', 'Reset token is missing from the URL.', 'danger');
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Updating...';

                const response = await fetch(`http://localhost:3000/api/auth/reset-password/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (response.ok) {
                    LookNepal.showToast('Success', 'Password automatically updated. Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'signIn.html';
                    }, 2000);
                } else {
                    LookNepal.showToast('Error', data.message || 'Failed to update password', 'danger');
                }

            } catch (error) {
                console.error('Reset password error:', error);
                LookNepal.showToast('Connection Error', 'Please check your internet connection and try again.', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
