<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Look Nepal</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 d-flex justify-content-center">

                <div class="auth-card">
                    <div class="text-center mb-4">
                        <a href="index.html" class="text-decoration-none">
                            <h1 class="text-primary fw-bold m-0" style="font-size: 2.5rem; letter-spacing: -1px;">
                                LookNepal</h1>
                        </a>
                    </div>

                    <h3 class="fw-bold mb-2">Reset Password</h3>
                    <p class="text-muted mb-4">Enter your email address and we'll send you a link to reset your
                        password.</p>

                    <form id="forgotPasswordForm">
                        <div class="mb-4">
                            <label for="email" class="form-label fw-medium">Email address</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-medium mb-3"
                            id="submitBtn">
                            Send Reset Link
                        </button>

                        <div class="text-center mt-3">
                            <a href="signIn.html" class="text-decoration-none text-muted"><i
                                    class="fa-solid fa-arrow-left me-1"></i> Back to login</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Sending...';

                const response = await fetch('http://localhost:3000/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    LookNepal.showToast('Check Your Email', 'If an account exists, a reset link has been dispatched.', 'success');
                    document.getElementById('email').value = ''; // clear form
                } else {
                    LookNepal.showToast('Error', data.message || 'Failed to send reset link', 'danger');
                }

            } catch (error) {
                console.error('Forgot password error:', error);
                LookNepal.showToast('Connection Error', 'Please check your internet connection and try again.', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
