<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Post a Job | Look Nepal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous" />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/faed8028ee.js" crossorigin="anonymous"></script>
</head>

<body style="background-color: #f6f5f2">
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">Look Nepal</a>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body p-5">
                        <h2 class="mb-4">Post a Job</h2>

                        <form id="postJobForm">
                            <div class="mb-3">
                                <label class="form-label">Job Title*</label>
                                <input type="text" class="form-control" id="title" required minlength="3">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Job Type*</label>
                                <select class="form-select" id="jobType" required>
                                    <option value="full-time">Full-time</option>
                                    <option value="part-time">Part-time</option>
                                    <option value="contract">Contract</option>
                                    <option value="internship">Internship</option>
                                    <option value="remote">Remote</option>
                                    <option value="freelance">Freelance</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Category*</label>
                                <select class="form-select" id="category" required>
                                    <option value="Technology">Technology</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="Sales">Sales</option>
                                    <option value="Finance">Finance</option>
                                    <option value="Human Resources">Human Resources</option>
                                    <option value="Operations">Operations</option>
                                    <option value="Customer Service">Customer Service</option>
                                    <option value="Design">Design</option>
                                    <option value="Healthcare">Healthcare</option>
                                    <option value="Education">Education</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Legal">Legal</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="form-label">Min Salary (Monthly)</label>
                                    <input type="number" class="form-control" id="salaryMin" required>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Max Salary (Monthly)</label>
                                    <input type="number" class="form-control" id="salaryMax" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">City*</label>
                                <input type="text" class="form-control" id="city" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Application Deadline*</label>
                                <input type="date" class="form-control" id="applicationDeadline" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Description*</label>
                                <textarea class="form-control" id="description" rows="5" required
                                    minlength="50"></textarea>
                                <div class="form-text">Minimum 50 characters.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Requirements*</label>
                                <textarea class="form-control" id="requirements" rows="5" required
                                    minlength="20"></textarea>
                                <div class="form-text">Minimum 20 characters.</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Required Skills (comma separated)*</label>
                                <input type="text" class="form-control" id="requiredSkills"
                                    placeholder="e.g. React, Node.js, MongoDB" required>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Post Job</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Check auth
        if (!LookNepal.currentUser() || LookNepal.currentUser().userType !== 'employer') {
            LookNepal.showToast('Access Denied', 'You must be logged in as an Employer to post a job.', 'danger');
            setTimeout(() => {
                window.location.href = 'signIn.html';
            }, 2000);
        }

        document.getElementById('postJobForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = {
                title: document.getElementById('title').value,
                jobType: document.getElementById('jobType').value,
                category: document.getElementById('category').value,
                salary: {
                    min: parseInt(document.getElementById('salaryMin').value),
                    max: parseInt(document.getElementById('salaryMax').value)
                },
                location: {
                    city: document.getElementById('city').value
                },
                applicationDeadline: document.getElementById('applicationDeadline').value,
                description: document.getElementById('description').value,
                requirements: document.getElementById('requirements').value,
                requiredSkills: document.getElementById('requiredSkills').value.split(',').map(s => s.trim()),
                experienceLevel: 'mid' // Default for now
            };

            try {
                const button = this.querySelector('button[type="submit"]');
                button.disabled = true;
                button.textContent = 'Posting...';

                await LookNepal.apiCall('/jobs', {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });

                LookNepal.showToast('Job Published', 'Your job has been posted successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                LookNepal.showToast('Error', error.message || 'Failed to post job', 'danger');
                const button = this.querySelector('button[type="submit"]');
                button.disabled = false;
                button.textContent = 'Post Job';
            }
        });
    </script>
</body>

</html>
